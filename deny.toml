# cargo-deny configuration.
#
# License allowlist for the dependency tree. Permissive licenses only - no
# copyleft. Every entry is required by at least one crate's SPDX expression
# (derived from `cargo metadata`); expressions that also offer a copyleft
# option (LGPL) or an exception (LLVM) are satisfied here via their permissive
# `OR` branch, so those are deliberately NOT allowed.
#
# After a dependency bump, re-run `cargo deny check licenses` and extend this
# list only with permissive licenses that newly appear.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-3-Clause",
    "Unicode-3.0",        # ICU / zerovec / yoke family (via idna -> url/reqwest)
    "CDLA-Permissive-2.0",
]
